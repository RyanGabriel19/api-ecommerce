spring.application.name=ecommerce-api

# H2 Configuration
spring.datasource.url=jdbc:h2:mem:ecommercedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console - Acesse em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mostrar o SQL no console (fundamental para aprender como o JPA trabalha)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Formatar o JSON no momento do response (não recomendado em produção)
spring.jackson.serialization.indent_output=true